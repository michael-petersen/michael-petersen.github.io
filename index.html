<script>
// ── Galaxy renderer ──────────────────────────────────────────────
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');

// Galaxy presets matched to content cycles
const galaxies = [
  { tilt: 0.35, spread: 1.0, arms: 3, color: [200, 220, 255] },   // data science
  { tilt: 0.15, spread: 1.3, arms: 2, color: [180, 210, 255] },   // astrophysics
  { tilt: 0.5,  spread: 0.8, arms: 4, color: [210, 230, 200] },   // cosmology
];

let currentGalaxy = 0;
let targetGalaxy = 0;
let morphProgress = 1;
const STARS = 6000;
let stars = [];
let W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  buildStars();
  draw();
}

function randGaussian() {
  let u = 0, v = 0;
  while (!u) u = Math.random();
  while (!v) v = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

function buildStars() {
  stars = Array.from({ length: STARS }, (_, i) => {
    const t = Math.random() * Math.PI * 2;
    const r = Math.abs(randGaussian()) * 0.28 + Math.random() * 0.05;
    return { t, r, size: Math.random() * 1.4 + 0.2, brightness: Math.random() };
  });
}

function getPos(star, galaxy) {
  const g = galaxies[galaxy];
  const armAngle = (Math.floor(star.t / (Math.PI * 2) * g.arms) / g.arms) * Math.PI * 2;
  const angle = armAngle + star.r * 3.5 + star.t * 0.4;
  const cx = Math.cos(angle) * star.r * g.spread;
  const cy = Math.sin(angle) * star.r * g.spread * g.tilt;
  return { x: cx, y: cy };
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  const cx = W * 0.62, cy = H * 0.46;
  const scale = Math.min(W, H) * 0.75;

  const gA = galaxies[currentGalaxy];
  const gB = galaxies[targetGalaxy];
  const p  = morphProgress;

  stars.forEach(star => {
    const posA = getPos(star, currentGalaxy);
    const posB = getPos(star, targetGalaxy);

    const x = cx + (posA.x + (posB.x - posA.x) * p) * scale;
    const y = cy + (posA.y + (posB.y - posA.y) * p) * scale;

    const cA = gA.color, cB = gB.color;
    const r = Math.round(cA[0] + (cB[0] - cA[0]) * p);
    const g = Math.round(cA[1] + (cB[1] - cA[1]) * p);
    const b = Math.round(cA[2] + (cB[2] - cA[2]) * p);

    const distFromCenter = Math.hypot(posA.x + (posB.x - posA.x) * p,
                                       posA.y + (posB.y - posA.y) * p);
    const alpha = (0.15 + star.brightness * 0.7) * (1 - distFromCenter * 0.6);

    ctx.beginPath();
    ctx.arc(x, y, star.size * 0.6, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},${b},${Math.max(0, alpha)})`;
    ctx.fill();
  });
}

let morphStart = null;
const MORPH_DURATION = 1200;

function morphTo(idx) {
  if (idx === targetGalaxy && morphProgress >= 1) return;
  currentGalaxy = targetGalaxy;
  targetGalaxy = idx;
  morphProgress = 0;
  morphStart = performance.now();
}

function animate(ts) {
  requestAnimationFrame(animate);
  if (morphProgress < 1) {
    morphProgress = Math.min(1, (ts - morphStart) / MORPH_DURATION);
    // ease in-out
    const t = morphProgress;
    morphProgress = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    draw();
  }
}

window.addEventListener('resize', resize);
resize();
requestAnimationFrame(animate);

// ── Cycling text ─────────────────────────────────────────────────
const adjectives = [
  'High performance computing',
  'Numerical methods',
  'Statistical inference',
  'Machine learning',
];

const fields = [
  'data science',
  'astrophysics',
  'time series analysis',
  'basis function expansions'
];

function cycleEl(el, list) {
  const idx = (parseInt(el.dataset.index) + 1) % list.length;
  el.classList.add('fade-out');
  setTimeout(() => {
    el.textContent = list[idx];
    el.dataset.index = idx;
    el.classList.remove('fade-out');
    el.classList.add('fade-in');
    setTimeout(() => el.classList.remove('fade-in'), 320);
  }, 300);
  return idx;
}

const adjEl   = document.getElementById('adj');
const fieldEl = document.getElementById('field');

adjEl.addEventListener('click', () => {
  cycleEl(adjEl, adjectives);
});

fieldEl.addEventListener('click', () => {
  const newIdx = cycleEl(fieldEl, fields);
  morphTo(newIdx);
});

// Auto-cycle every 4 seconds, offset by 2s
let adjAutoIdx = 0;
setInterval(() => {
  adjAutoIdx = (adjAutoIdx + 1) % adjectives.length;
  adjEl.classList.add('fade-out');
  setTimeout(() => {
    adjEl.textContent = adjectives[adjAutoIdx];
    adjEl.dataset.index = adjAutoIdx;
    adjEl.classList.remove('fade-out');
    adjEl.classList.add('fade-in');
    setTimeout(() => adjEl.classList.remove('fade-in'), 320);
  }, 300);
}, 4000);

let fieldAutoIdx = 0;
setInterval(() => {
  fieldAutoIdx = (fieldAutoIdx + 1) % fields.length;
  fieldEl.classList.add('fade-out');
  setTimeout(() => {
    fieldEl.textContent = fields[fieldAutoIdx];
    fieldEl.dataset.index = fieldAutoIdx;
    fieldEl.classList.remove('fade-out');
    fieldEl.classList.add('fade-in');
    setTimeout(() => fieldEl.classList.remove('fade-in'), 320);
    morphTo(fieldAutoIdx);
  }, 300);
}, 5500);
</script>
